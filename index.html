<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Human Agency</title>
    <link rel="stylesheet" href="style.css?v=48">
  </head>
  <body>
    <main id="experience" class="experience" aria-live="polite">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>

      <section class="anchor-layer" aria-label="Human Agency interactive manifesto">
        <h1 id="brand-title" class="brand-title title-font">Human Agency</h1>
        <p id="tagline" class="tagline subtext-font">The CAA of Engineering Talent</p>
      </section>

      <section id="quote-layer" class="quote-layer" aria-label="Satya Nadella quote" data-type-sequence>
        <div class="quote-line quote-before" data-type="&quot;I believe"></div>
        <div class="quote-brand title-font" data-type="Human Agency"></div>
        <div class="quote-bottom">
          <div class="quote-line quote-after" data-type="will be the driver of token capital growth. Humans will set ambitious goals, connect dots across domains, build relationships, and recognize patterns that matter most. Without human direction, you have compute running in circles.&quot;"></div>
          <div class="quote-attribution" data-type="-SATYA NADELLA"></div>
        </div>
      </section>

      <section id="diagram-layer" class="diagram-layer" aria-label="Human Agency concept sequence">
        <svg class="relationship-layer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
              <path d="M 0 0 L 8 4 L 0 8 z"></path>
            </marker>
          </defs>
          <g class="relationship relationship-mentorship">
            <path id="mentorship-line" class="relationship-line" pathLength="100" d="M 32 30 L 62 30"></path>
          </g>
          <g class="relationship relationship-develop">
            <path id="develop-line" class="relationship-line" pathLength="100" d="M 88 64 L 88 30"></path>
          </g>
          <g class="relationship relationship-selection">
            <path id="selection-line" class="relationship-line" pathLength="100" d="M 62 81 L 32 81"></path>
          </g>
          <g class="relationship relationship-investable">
            <path id="investable-stem-line" class="relationship-line relationship-line-stem" pathLength="100" d="M 12 64 L 12 51"></path>
            <path id="investable-line" class="relationship-line" pathLength="100" d="M 12 51 L 27 51"></path>
          </g>
        </svg>
        <div class="relationship-labels" aria-hidden="true">
          <span class="relationship-text relationship-text-mentorship">Mentorship</span>
          <span class="relationship-text relationship-text-develop">Develop</span>
          <span class="relationship-text relationship-text-selection">Project Selection</span>
          <span class="relationship-text relationship-text-invest">Fund</span>
        </div>

        <div class="concept-page founder-page">
          <h2 class="concept-title founder-title title-font" data-type="Founder Counsel"></h2>
          <p class="concept-subtext founder-subtext quote-copy-font" data-type="20 hand selected unicorn founders who can provide mentorship and nominate a cohort of engineering talent who will create the next wave of generational companies"></p>
        </div>

        <div class="concept-page cohort-page">
          <h2 class="concept-title cohort-title title-font" data-type="Engineering Cohort"></h2>
          <p class="concept-subtext cohort-subtext quote-copy-font" data-type="60 deep tech engineers nominated by the Founder Counsel as most likely to create the world's next generation frontier tech companies"></p>
        </div>

        <div class="concept-page foundation-page">
          <h2 class="concept-title foundation-title title-font" data-type="Foundation"></h2>
          <p class="concept-subtext foundation-subtext quote-copy-font" data-type="Providing $100k research grants to fuel the Engineering Cohort's creativity&#10;Media arm develops social profiles of talent pool"></p>
        </div>

        <div class="concept-page venture-page">
          <h2 class="concept-title venture-title title-font" data-type="Venture Fund"></h2>
          <p class="concept-subtext venture-subtext quote-copy-font" data-type="First check into the investable ideas or companies that the engineering talent get recruited to"></p>
        </div>

        <div class="concept-page investable-page">
          <h2 class="concept-title investable-title title-font" data-type="Investable Ideas"></h2>
        </div>
      </section>

      <div class="progress" aria-hidden="true">
        <span id="progress-label">00</span>
      </div>
    </main>

    <script src="app.js?v=48"></script>
  </body>
</html>
